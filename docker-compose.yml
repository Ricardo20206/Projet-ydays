services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: projet-ydays-web
    ports:
      - "5000:5000"
    environment:
      API_BASE_URL: http://api:5001
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    volumes:
      - ./images:/app/images
      - ./videos:/app/videos
      - ./uploads:/app/uploads
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: projet-ydays-api
    ports:
      - "5001:5001"
    volumes:
      - ./api_uploads:/app/api_uploads