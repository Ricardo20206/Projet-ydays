<!-- GESTIONNAIRE DE PROMPTS POUR L'IA GÉNÉRATIVE -->
<!-- À inclure dans image.html et video.html -->

<link rel="stylesheet" href="{{ url_for('static', filename='css/prompt-manager.css') }}">
<script src="{{ url_for('static', filename='js/prompt-generator.js') }}"></script>
<script src="{{ url_for('static', filename='js/api-integration.js') }}"></script>

<!-- Bouton pour ouvrir le panel de prompts -->
<button class="prompt-btn" id="promptBtn" onclick="window.togglePromptPanel?.();" 
        style="position: relative; z-index: 10002; cursor: pointer; background: #FF6B35; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; margin-left: 10px;">
    Assistant IA -> Prompt
</button>

<!-- Panel de gestion des prompts -->
<div id="promptPanel" class="prompt-panel" style="
    position: fixed;
    top: 0;
    right: -500px;
    width: 500px;
    height: 100vh;
    background: white;
    z-index: 3000;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
    transition: right 0.4s ease-in-out;
    overflow: hidden;
">
    <!-- Header -->
    <div style="
        background: linear-gradient(135deg, #FF6B35, #FF8C42);
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #FF6B35;
    ">
        <h2 style="margin: 0; font-size: 20px;">Gestionnaire de Prompts</h2>
        <button onclick="window.togglePromptPanel?.();" 
                style="background: rgba(255,255,255,0.3); border: none; color: white; cursor: pointer; font-size: 20px; padding: 5px 10px; border-radius: 3px;">
            ✕
        </button>
    </div>

    <!-- Content -->
    <div style="
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    ">
        <!-- Section Résumé -->
        <div class="prompt-section">
            <h3 style="margin: 0 0 10px 0; color: #2a2a2a;">Résumé des éléments</h3>
            <div id="elementsSummary" style="
                background: #f5f5f5;
                padding: 12px;
                border-radius: 5px;
                font-size: 14px;
                color: #555;
                font-family: monospace;
            ">
                Aucun élément ajouté...
            </div>
        </div>

        <!-- Section Description utilisateur -->
        <div class="prompt-section">
            <h3 style="margin: 0 0 10px 0; color: #2a2a2a;">Ce que vous voulez faire?</h3>
            <textarea id="userIntention" placeholder="Ex: 'Ajouter des lueurs subtiles autour des formes', 'Créer un effet de profondeur 3D', 'Animer les textes avec un fondu', etc..." 
                    style="
                        width: 100%;
                        height: 80px;
                        padding: 10px;
                        border: 2px solid #ddd;
                        border-radius: 5px;
                        font-family: Arial, sans-serif;
                        font-size: 13px;
                        resize: vertical;
                        box-sizing: border-box;
                    "></textarea>
        </div>

        <!-- Section Aperçu du Prompt -->
        <div class="prompt-section">
            <h3 style="margin: 0 0 10px 0; color: #2a2a2a;">Aperçu du prompt</h3>
            <div id="promptPreview" style="
                background: #f9f9f9;
                padding: 10px;
                border-radius: 5px;
                border-left: 4px solid #FF6B35;
                font-size: 12px;
                color: #666;
                max-height: 150px;
                overflow-y: auto;
                font-family: monospace;
                white-space: pre-wrap;
                word-wrap: break-word;
            ">
                Ajoutez des éléments pour voir le prompt...
            </div>
            <button onclick="window.copyToClipboard?.();" 
                    style="
                        margin-top: 8px;
                        width: 100%;
                        padding: 8px;
                        background: #4CAF50;
                        color: white;
                        border: none;
                        border-radius: 3px;
                        cursor: pointer;
                        font-size: 12px;
                        font-weight: bold;
                    ">
                Copier le prompt
            </button>
        </div>

        <!-- Section Export JSON -->
        <div class="prompt-section">
            <h3 style="margin: 0 0 10px 0; color: #2a2a2a;">Export structuré</h3>
            <div style="display: flex; gap: 8px;">
                <button onclick="window.downloadAsJSON?.();" 
                        style="
                            flex: 1;
                            padding: 8px;
                            background: #2196F3;
                            color: white;
                            border: none;
                            border-radius: 3px;
                            cursor: pointer;
                            font-size: 12px;
                            font-weight: bold;
                        ">
                    Télécharger JSON
                </button>
                <button onclick="window.showRawJSON?.();" 
                        style="
                            flex: 1;
                            padding: 8px;
                            background: #9C27B0;
                            color: white;
                            border: none;
                            border-radius: 3px;
                            cursor: pointer;
                            font-size: 12px;
                            font-weight: bold;
                        ">
                    Voir JSON
                </button>
            </div>
        </div>
    </div>

    <!-- Footer avec bouton d'envoi -->
    <div style="
        background: #f5f5f5;
        padding: 15px;
        border-top: 2px solid #ddd;
        display: flex;
        gap: 10px;
    ">
        <button onclick="window.sendToAPIHandler?.();" 
                style="
                    flex: 1;
                    padding: 12px;
                    background: linear-gradient(135deg, #FF6B35, #FF8C42);
                    color: white;
                    border: none;
                    border-radius: 5px;
                    cursor: pointer;
                    font-size: 14px;
                    font-weight: bold;
                    transition: transform 0.2s;
                "
                onmouseover="this.style.transform='scale(1.02)'"
                onmouseout="this.style.transform='scale(1)'">
            Envoyer à l'API
        </button>
    </div>
</div>

<!-- Overlay -->
<div id="promptOverlay" class="prompt-overlay" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 2999;
    display: none;
    opacity: 0;
    transition: opacity 0.3s;
" onclick="window.togglePromptPanel?.();"></div>

<!-- Modal JSON -->
<div id="jsonModal" style="
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    z-index: 4000;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s;
">
    <h2 style="margin: 0 0 15px 0; color: #2a2a2a;">Données JSON</h2>
    <textarea id="jsonContent" readonly style="
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-family: monospace;
        font-size: 11px;
        resize: none;
        overflow: auto;
        margin-bottom: 10px;
    "></textarea>
    <div style="display: flex; gap: 10px;">
        <button onclick="navigator.clipboard.writeText(document.getElementById('jsonContent').value); alert('Copié!'); window.closeJSONModal();" 
                style="flex: 1; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Copier et fermer
        </button>
        <button onclick="window.closeJSONModal();" 
                style="flex: 1; padding: 10px; background: #ccc; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Fermer
        </button>
    </div>
</div>

<script>
// ============================================
// GESTION DU PROMPT PANEL
// ============================================

window.togglePromptPanel = function() {
    const panel = document.getElementById('promptPanel');
    const overlay = document.getElementById('promptOverlay');
    const isOpen = panel.style.right === '0px';

    if (isOpen) {
        // Fermer
        panel.style.right = '-500px';
        overlay.style.display = 'none';
        document.body.style.overflow = 'auto';
        setTimeout(() => { overlay.style.opacity = '0'; }, 50);
    } else {
        // Ouvrir
        panel.style.right = '0';
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        setTimeout(() => { overlay.style.opacity = '1'; }, 50);
        
        // Mettre à jour l'aperçu
        window.updatePromptPreview?.();
    }
};

window.updatePromptPreview = function() {
    if (!window.PromptGenerator) {
        console.warn('PromptGenerator non chargé');
        return;
    }

    // Récupérer les infos du média
    const mediaEl = document.getElementById('editableImage') || document.getElementById('editableVideo');
    let mediaInfo = { width: 1280, height: 720, type: 'image' };
    
    if (mediaEl) {
        if (mediaEl.tagName === 'IMG') {
            mediaInfo = {
                type: 'image',
                width: mediaEl.naturalWidth || 1280,
                height: mediaEl.naturalHeight || 720
            };
        } else if (mediaEl.tagName === 'VIDEO') {
            mediaInfo = {
                type: 'video',
                width: mediaEl.videoWidth || 1280,
                height: mediaEl.videoHeight || 720
            };
        }
    }

    // Mise à jour du résumé
    const summary = window.PromptGenerator.generateSummary(window.addedElements);
    document.getElementById('elementsSummary').textContent = summary;

    // Mise à jour de l'aperçu du prompt
    const userIntent = document.getElementById('userIntention').value;
    const elementsData = window.PromptGenerator.generateElementsDescription(window.addedElements, mediaInfo, userIntent);
    
    const preview = `RÉSUMÉ:
${elementsData.summary.totalElements} éléments (${elementsData.summary.shapes} formes, ${elementsData.summary.texts} textes, ${elementsData.summary.lines} lignes)

DISPOSITION:
${elementsData.description.substring(0, 300)}...

INTENTION: ${userIntent || '(non spécifiée)'}`;

    document.getElementById('promptPreview').textContent = preview;
};

window.copyToClipboard = function() {
    const mediaEl = document.getElementById('editableImage') || document.getElementById('editableVideo');
    let mediaInfo = {};
    
    if (mediaEl) {
        if (mediaEl.tagName === 'IMG') {
            mediaInfo = {
                type: 'image',
                width: mediaEl.naturalWidth || 1280,
                height: mediaEl.naturalHeight || 720
            };
        } else {
            mediaInfo = {
                type: 'video',
                width: mediaEl.videoWidth || 1280,
                height: mediaEl.videoHeight || 720
            };
        }
    }

    const userIntent = document.getElementById('userIntention').value;
    const fullPrompt = window.PromptGenerator.generateFullPrompt(
        window.addedElements,
        userIntent,
        mediaInfo
    );

    navigator.clipboard.writeText(fullPrompt).then(() => {
        alert('Prompt copié dans le presse-papiers!');
    });
};

window.downloadAsJSON = function() {
    const mediaEl = document.getElementById('editableImage') || document.getElementById('editableVideo');
    let mediaInfo = {};
    
    if (mediaEl) {
        if (mediaEl.tagName === 'IMG') {
            mediaInfo = {
                type: 'image',
                width: mediaEl.naturalWidth || 1280,
                height: mediaEl.naturalHeight || 720
            };
        } else {
            mediaInfo = {
                type: 'video',
                width: mediaEl.videoWidth || 1280,
                height: mediaEl.videoHeight || 720
            };
        }
    }

    const userIntent = document.getElementById('userIntention').value;
    const data = window.PromptGenerator.generateElementsDescription(window.addedElements, mediaInfo, userIntent);
    const json = JSON.stringify(data, null, 2);
    
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `elements_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
};

window.showRawJSON = function() {
    const mediaEl = document.getElementById('editableImage') || document.getElementById('editableVideo');
    let mediaInfo = {};
    
    if (mediaEl) {
        if (mediaEl.tagName === 'IMG') {
            mediaInfo = {
                type: 'image',
                width: mediaEl.naturalWidth || 1280,
                height: mediaEl.naturalHeight || 720
            };
        } else {
            mediaInfo = {
                type: 'video',
                width: mediaEl.videoWidth || 1280,
                height: mediaEl.videoHeight || 720
            };
        }
    }

    const userIntent = document.getElementById('userIntention').value;
    const data = window.PromptGenerator.generateElementsDescription(window.addedElements, mediaInfo, userIntent);
    const json = JSON.stringify(data, null, 2);
    
    document.getElementById('jsonContent').value = json;
    const modal = document.getElementById('jsonModal');
    modal.style.transform = 'translate(-50%, -50%) scale(1)';
};

window.closeJSONModal = function() {
    const modal = document.getElementById('jsonModal');
    modal.style.transform = 'translate(-50%, -50%) scale(0)';
};

window.sendToAPIHandler = async function() {
    if (!window.addedElements || window.addedElements.length === 0) {
        alert('Aucun élément à traiter!');
        return;
    }

    const mediaEl = document.getElementById('editableImage') || document.getElementById('editableVideo');
    let mediaInfo = { width: 1280, height: 720, type: 'image' };
    
    if (mediaEl) {
        if (mediaEl.tagName === 'IMG') {
            mediaInfo = {
                type: 'image',
                width: mediaEl.naturalWidth || 1280,
                height: mediaEl.naturalHeight || 720
            };
        } else {
            mediaInfo = {
                type: 'video',
                width: mediaEl.videoWidth || 1280,
                height: mediaEl.videoHeight || 720
            };
        }
    }

    const userIntent = document.getElementById('userIntention').value;
    
    try {
        const response = await window.APIIntegration.processElements(
            window.addedElements,
            userIntent,
            null,
            mediaInfo
        );

        alert('Requête envoyée à l\'API!\\nConsultez la console pour les détails.');
    } catch (error) {
        console.error('Erreur:', error);
    }
};

// Mise à jour auto du preview quand on tappe
document.getElementById('userIntention')?.addEventListener('input', function() {
    window.updatePromptPreview?.();
});

// Émettre un événement personnalisé quand addedElements change
// (À intégrer dans ta logique d'ajout d'éléments)
const updateUI = () => {
    window.updatePromptPreview?.();
};

// Écouter les changements de window.addedElements
// (Appeler updateUI() après chaque modification d'éléments)
window.addEventListener('elementsUpdated', updateUI);

console.log('Prompt Manager chargé avec succès');
</script>
